<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вікторина 400 англійських слів</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #9b9890;
    --accent: #1D9E75;
    --accent-dark: #0F6E56;
    --accent-light: #E1F5EE;
    --danger: #E24B4A;
    --danger-light: #FCEBEB;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.16);
    --radius: 10px;
    --radius-lg: 14px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  h1 {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 4px;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text3);
    text-align: center;
    margin-bottom: 20px;
    font-family: sans-serif;
  }
  #app { width: 100%; max-width: 600px; }

  .controls {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--surface2); color: var(--text); }
  .ctrl-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .spacer { flex: 1; }

  .stats-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    flex: 1;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: var(--text3); font-family: sans-serif; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-val { font-size: 22px; font-weight: bold; color: var(--text); font-family: sans-serif; }
  .stat-val.green { color: var(--accent); }
  .stat-val.red { color: var(--danger); }

  .progress-wrap { background: var(--surface2); border-radius: 4px; height: 5px; margin-bottom: 18px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px 22px 20px;
    margin-bottom: 12px;
  }
  .part-badge {
    display: inline-block;
    font-size: 11px;
    font-family: sans-serif;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .word-display {
    font-size: 36px;
    font-weight: normal;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .transcr {
    font-size: 14px;
    color: var(--text3);
    font-family: sans-serif;
    font-style: italic;
    margin-bottom: 6px;
  }
  .hint-row { margin-bottom: 16px; }
  .hint-btn {
    font-family: sans-serif;
    font-size: 13px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .hint-box {
    font-family: sans-serif;
    font-size: 13px;
    color: var(--text2);
    background: var(--surface2);
    border-radius: 6px;
    padding: 6px 12px;
    margin-top: 6px;
    display: inline-block;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .opt {
    font-family: sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 13px 14px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    line-height: 1.3;
  }
  .opt:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); transform: translateY(-1px); }
  .opt.correct { background: var(--accent-light); border-color: var(--accent); color: #085041; }
  .opt.wrong   { background: var(--danger-light); border-color: var(--danger); color: #501313; }
  .opt:disabled { cursor: default; transform: none; }
  /* 5th option spans full width */
  .opt.wide { grid-column: 1 / -1; }

  .feedback {
    margin-top: 14px;
    font-family: sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.4;
  }
  .feedback.ok  { background: var(--accent-light); color: #085041; }
  .feedback.err { background: var(--danger-light); color: #501313; }

  .type-input {
    width: 100%;
    font-size: 17px;
    font-family: sans-serif;
    padding: 11px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .type-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }

  .submit-btn {
    font-family: sans-serif;
    font-size: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--accent-dark); }

  .next-btn {
    font-family: sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 22px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
    display: block;
    margin-top: 12px;
  }
  .next-btn:hover { background: var(--surface2); }

  /* Results */
  .results {
    text-align: center;
    padding: 32px 24px;
  }
  .results-emoji { font-size: 48px; margin-bottom: 12px; }
  .results h2 { font-size: 22px; font-weight: normal; margin-bottom: 8px; }
  .score-big { font-size: 56px; font-weight: bold; color: var(--accent); font-family: sans-serif; line-height: 1; margin-bottom: 6px; }
  .results-info { font-family: sans-serif; font-size: 14px; color: var(--text2); margin-bottom: 20px; }
  .restart-btn {
    font-family: sans-serif;
    font-size: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 32px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s;
    margin-right: 8px;
  }
  .restart-btn:hover { background: var(--accent-dark); }
  .restart-btn.outline {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .restart-btn.outline:hover { background: var(--surface2); }

  .session-select { font-family: sans-serif; font-size: 13px; color: var(--text2); margin-top: 14px; }
  .session-select select {
    font-family: sans-serif;
    font-size: 13px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    margin-left: 6px;
  }
</style>
</head>
<body>

const seen = new Set();
const UNIQUE = [];
for(const w of WORDS){ const k=w[0]+'|'+w[1]; if(!seen.has(k)){seen.add(k);UNIQUE.push(w);} }

let mode = 'multi';
let dir = 'en2ua';
let total = 20;
let session = [];
let idx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let userAns = '';
let showHint = false;
let done = false;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildSession(){
  session = shuffle(UNIQUE).slice(0, total);
  session.forEach(w => delete w._opts);
  idx=0; correct=0; wrong=0; answered=false; userAns=''; showHint=false; done=false;
}

function getOptions(cur){
  const pool = UNIQUE.filter(w => w!==cur);
  return shuffle([cur, ...shuffle(pool).slice(0,4)]);
}

function render(){
  const root = document.getElementById('root');
  if(done){ root.innerHTML = renderResults(); return; }
  const cur = session[idx];
  const q = dir==='en2ua' ? cur[0] : cur[1];
  const a = dir==='en2ua' ? cur[1] : cur[0];
  const pct = Math.round((idx/total)*100);

  root.innerHTML = `
    <div class="controls">
      <button class="ctrl-btn${mode==='multi'?' active':''}" onclick="setMode('multi')">5 варіантів</button>
      <button class="ctrl-btn${mode==='type'?' active':''}" onclick="setMode('type')">Введення</button>
      <span class="spacer"></span>
      <button class="ctrl-btn${dir==='en2ua'?' active':''}" onclick="setDir('en2ua')">Англ→Укр</button>
      <button class="ctrl-btn${dir==='ua2en'?' active':''}" onclick="setDir('ua2en')">Укр→Англ</button>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Питання</div><div class="stat-val">${idx+1}&nbsp;/&nbsp;${total}</div></div>
      <div class="stat"><div class="stat-label">Правильно</div><div class="stat-val green">${correct}</div></div>
      <div class="stat"><div class="stat-label">Помилки</div><div class="stat-val red">${wrong}</div></div>
      <div class="stat"><div class="stat-label">Слів у базі</div><div class="stat-val">${UNIQUE.length}</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="part-badge">${cur[3]}</div>
      <div class="word-display">${q}</div>
      ${dir==='en2ua' ? `<div class="transcr">[${cur[2]}]</div>` : ''}
      <div class="hint-row">
        ${!answered ? `<button class="hint-btn" onclick="toggleHint()">💡 підказка</button>` : ''}
        ${showHint && !answered ? `<div class="hint-box">${dir==='en2ua' ? cur[3] : '['+cur[2]+']'}</div>` : ''}
      </div>
      ${mode==='multi' ? renderMulti(cur, a) : renderType(a)}
    </div>
    ${answered ? `<button class="next-btn" onclick="nextQ()">Наступне →</button>` : ''}
  `;
  if(mode==='type' && !answered){
    const inp = document.getElementById('typein');
    if(inp){ inp.focus(); inp.value = ''; }
  }
}

function renderMulti(cur, correctAns){
  if(!cur._opts) cur._opts = getOptions(cur);
  const opts = cur._opts;
  let html = '<div class="options-grid">';
  opts.forEach((opt, i) => {
    const label = dir==='en2ua' ? opt[1] : opt[0];
    const isCorrect = opt===cur;
    const isLast = i===4;
    let cls = 'opt' + (isLast ? ' wide' : '');
    if(answered){
      if(isCorrect) cls += ' correct';
      else if(label===userAns) cls += ' wrong';
    }
    const safe = label.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    const ca = correctAns.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    html += `<button class="${cls}" onclick="pickOpt('${safe}','${ca}',${isCorrect})" ${answered?'disabled':''}>${label}</button>`;
  });
  html += '</div>';
  if(answered){
    const ok = userAns===correctAns;
    html += `<div class="feedback ${ok?'ok':'err'}">${ok ? '✓ Правильно!' : '✗ Правильно: '+correctAns}</div>`;
  }
  return html;
}

function renderType(correctAns){
  const ca = correctAns.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
  let html = `<input id="typein" class="type-input" type="text" placeholder="Введіть переклад..." onkeydown="if(event.key==='Enter')checkType('${ca}')">`;
  if(!answered) html += `<button class="submit-btn" onclick="checkType('${ca}')">Перевірити</button>`;
  if(answered){
    const norm = s => s.toLowerCase().trim().replace(/['']/g,"'");
    const ok = norm(userAns)===norm(correctAns);
    html += `<div class="feedback ${ok?'ok':'err'}">${ok ? '✓ Правильно!' : '✗ Правильно: '+correctAns}</div>`;
  }
  return html;
}

function renderResults(){
  const pct = Math.round((correct/total)*100);
  const em = pct>=80?'🎉':pct>=50?'👍':'💪';
  return `<div class="card results">
    <div class="results-emoji">${em}</div>
    <h2>Результат</h2>
    <div class="score-big">${pct}%</div>
    <div class="results-info">Правильно: ${correct} з ${total} · Помилки: ${wrong}</div>
    <div class="results-info">Слів у базі: ${UNIQUE.length}</div>
    <div>
      <button class="restart-btn" onclick="restart()">Нова сесія</button>
      <button class="restart-btn outline" onclick="changeDir()">Змінити напрям</button>
    </div>
    <div class="session-select">
      Питань у сесії:
      <select onchange="changeTotal(this.value)">
        <option value="10" ${total===10?'selected':''}>10</option>
        <option value="20" ${total===20?'selected':''}>20</option>
        <option value="30" ${total===30?'selected':''}>30</option>
        <option value="50" ${total===50?'selected':''}>50</option>
        <option value="${UNIQUE.length}" ${total===UNIQUE.length?'selected':''}>Всі (${UNIQUE.length})</option>
      </select>
    </div>
  </div>`;
}

function toggleHint(){ showHint=!showHint; render(); }
function pickOpt(label, ca, isCorrect){
  if(answered) return;
  answered=true; userAns=label;
  if(isCorrect) correct++; else wrong++;
  render();
}
function checkType(ca){
  const inp=document.getElementById('typein');
  if(!inp) return;
  userAns=inp.value; answered=true;
  const norm=s=>s.toLowerCase().trim().replace(/['']/g,"'");
  if(norm(userAns)===norm(ca)) correct++; else wrong++;
  render();
}
function nextQ(){
  idx++; answered=false; userAns=''; showHint=false;
  if(idx>=total) done=true;
  render();
}
function setMode(m){ mode=m; answered=false; userAns=''; render(); }
function setDir(d){ dir=d; render(); }
function restart(){ buildSession(); render(); }
function changeDir(){ dir=dir==='en2ua'?'ua2en':'en2ua'; restart(); }
function changeTotal(n){ total=parseInt(n); restart(); }

buildSession();
render();
</script>
